name: Weekly Update Check

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update-check:
    name: Apply Lint Fixes and Open Issue
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Auto-fix Markdown issues
        run: npm run lint:markdown:fix || true

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push fixes to branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B automated/weekly-lint-fixes
          git add -A
          git commit -m "chore: auto-fix markdown lint issues"
          git push --force origin automated/weekly-lint-fixes

      - name: Create issue for available lint fixes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          existing=$(gh issue list --state open \
            --search "chore: weekly markdown lint fixes available" \
            --json number --jq '.[0].number')
          if [ -z "$existing" ]; then
            gh issue create \
              --title "chore: weekly markdown lint fixes available" \
              --body "Automated weekly lint fixes are available on branch \`automated/weekly-lint-fixes\`.

          This branch contains automatic fixes applied by markdownlint-cli2.
          Please review the branch and open a pull request if the changes look correct." \
              --assignee dsdeboer
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
