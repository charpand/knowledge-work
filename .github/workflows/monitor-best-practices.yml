name: Monitor External Best Practices

on:
  schedule:
    - cron: "0 9 * * 0" # Every Sunday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-best-practices:
    name: Check Best Practices and Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check for updates
        id: updates
        run: |
          findings=""
          
          # Check npm for outdated packages
          npm outdated --json > /tmp/outdated.json || echo '{}' > /tmp/outdated.json
          outdated_count=$(jq 'length' /tmp/outdated.json)
          
          if [ "$outdated_count" -gt 0 ]; then
            findings="${findings}### Outdated Dependencies ($outdated_count packages)\n"
            findings="${findings}$(jq -r 'to_entries[] | "- \(.key): \(.value.current) → \(.value.latest)"' /tmp/outdated.json)\n\n"
          fi
          
          # Check Node.js LTS
          current_node=$(node --version | cut -dv -f2 | cut -d. -f1)
          findings="${findings}### Node.js Status\n"
          findings="${findings}- Current: Node $current_node.x\n"
          findings="${findings}- Minimum Required: Node 22.x\n\n"
          
          findings=$(printf "%b" "$findings" | sed 's/%/%%/g' | sed ':a;N;$!ba;s/\n/%0A/g')
          echo "findings=${findings}" >> "$GITHUB_OUTPUT"
          
          if [ "$outdated_count" -gt 0 ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue if findings exist
        if: steps.updates.outputs.has_findings == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const findings = `${{ steps.updates.outputs.findings }}`.replace(/%0A/g, '\n').replace(/%%/g, '%');
            
            const body = `## Best Practices Report

${findings}

Please review and update dependencies as needed.

---
Generated by Best Practices Monitor`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: external best practices review needed',
              body: body,
              assignees: ['dsdeboer'],
              labels: ['maintenance', 'best-practices']
            });
