name: Monitor External Best Practices

on:
  schedule:
    - cron: "0 9 * * 0" # Every Sunday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-best-practices:
    name: Check Best Practices and Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json

      - name: Check for updates
        id: updates
        run: |
          findings=""
          
          # Check Node LTS versions
          node_lts=$(curl -s https://nodejs.org/dist/index.json | jq -r '.[0].version' | cut -d. -f1)
          current_node=$(node --version | cut -dv -f2 | cut -d. -f1)
          
          if [ "$node_lts" -gt "$current_node" ]; then
            findings="${findings}### Node.js LTS Update Available\n"
            findings="${findings}- Current: Node $current_node\n"
            findings="${findings}- Latest LTS: Node $node_lts\n\n"
          fi
          
          # Check npm outdated packages
          outdated=$(npm outdated --json 2>/dev/null || echo '{}')
          if [ "$outdated" != "{}" ] && [ "$outdated" != "" ]; then
            findings="${findings}### Outdated Dependencies\n"
            findings="${findings}\`\`\`json\n${outdated}\n\`\`\`\n\n"
          fi
          
          # Check markdownlint-cli2 latest version
          latest_mdl=$(npm view markdownlint-cli2 version)
          current_mdl=$(jq -r '.devDependencies."markdownlint-cli2"' package.json | sed 's/\^//')
          
          if [ "$latest_mdl" != "$current_mdl" ]; then
            findings="${findings}### markdownlint-cli2 Update Available\n"
            findings="${findings}- Current: $current_mdl\n"
            findings="${findings}- Latest: $latest_mdl\n\n"
          fi
          
          # Check GitHub Actions versions used in workflows
          findings="${findings}### GitHub Actions Versions\n"
          actions=$(grep -h "uses: " .github/workflows/*.yml | grep -v "^#" | sort -u)
          findings="${findings}\`\`\`\n${actions}\n\`\`\`\n\n"
          
          # Escape for GitHub output
          findings=$(echo -e "$findings" | sed 's/%/%%/g' | sed 's/\n/%0A/g')
          echo "findings=${findings}" >> "$GITHUB_OUTPUT"
          
          if [ -z "${findings// }" ]; then
            echo "no_findings=true" >> "$GITHUB_OUTPUT"
          else
            echo "no_findings=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create issue if findings exist
        if: steps.updates.outputs.no_findings == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const findings = `${{ steps.updates.outputs.findings }}`.replace(/%0A/g, '\n');
            
            const body = `## Best Practices Report

${findings}

Please review and update dependencies as needed. Consider:
- Updating to latest Node.js LTS
- Updating outdated packages
- Checking compatibility of updated dependencies

---
Generated by Best Practices Monitor`;

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'chore: external best practices review needed',
              body: body,
              assignees: ['dsdeboer'],
              labels: ['maintenance', 'best-practices']
            });
